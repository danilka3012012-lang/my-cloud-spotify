<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodika — Русская музыка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">🎵</div>
                <span>Melodika</span>
                <span class="badge" id="trackCount">0</span>
            </div>
            
            <div class="nav-item active" onclick="switchSection('search')">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>Поиск</span>
            </div>
            
            <div class="nav-item" onclick="switchSection('library')">
                <svg viewBox="0 0 24 24"><path d="M4 6h2v12H4zm4 0h2v12H8zm4 0h2v12h-2zm8 0v12h-4V6h4z"/></svg>
                <span>Библиотека</span>
            </div>
            
            <div class="nav-item" onclick="switchSection('local')">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <span>Мои файлы</span>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main">
            <div class="main-header">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input id="searchInput" placeholder="Поиск русских песен..." onkeydown="if(event.key==='Enter')doSearch()">
                    <button class="search-btn" onclick="doSearch()">Найти</button>
                </div>
            </div>
            
            <div class="content" id="content"></div>
        </div>

        <!-- PLAYER -->
        <div class="player" id="player">
            <div class="player-track">
                <div class="cover" id="playerCover">🎵</div>
                <div class="info">
                    <div class="name" id="playerName">Выберите трек</div>
                    <div class="artist" id="playerArtist">—</div>
                </div>
            </div>
            
            <div class="player-controls">
                <div class="player-buttons">
                    <button onclick="toggleShuffle()" id="shuffleBtn">🔀</button>
                    <button onclick="prevTrack()">⏮</button>
                    <button class="play-btn" onclick="togglePlay()" id="playBtn">▶</button>
                    <button onclick="nextTrack()">⏭</button>
                    <button onclick="toggleRepeat()" id="repeatBtn">🔁</button>
                </div>
                <div class="progress-bar">
                    <span id="currentTime">0:00</span>
                    <div class="progress-track" onclick="seek(event)">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
            
            <div class="player-extra">
                <button onclick="toggleMute()">🔊</button>
                <div class="volume-bar" onclick="setVolume(event)">
                    <div class="volume-fill" id="volumeFill"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>
    <audio id="audio"></audio>
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melodika — Музыкальный плеер</title>
<style>
:root{--bg:#0a0a0a;--surface:rgba(20,20,20,.85);--card:rgba(30,30,30,.7);--text:#fff;--text2:#a0a0a0;--text3:#666;--accent:#ff6b35;--accent2:#1db954;--glass:rgba(255,255,255,.06);--glass-border:rgba(255,255,255,.1);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Roboto',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:1fr 90px;height:100vh;}
.sidebar{background:rgba(0,0,0,.7);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-right:1px solid var(--glass-border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;z-index:100;}
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px;}
.logo{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:16px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,107,53,.3);animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{transform:scale(1);box-shadow:0 4px 16px rgba(255,107,53,.3);}50%{transform:scale(1.05);box-shadow:0 4px 24px rgba(255,107,53,.5);}}
.logo-icon svg{width:22px;height:22px;fill:#fff;}
.logo span{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:gradientShift 4s ease infinite;}
@keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.nav-item{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:10px;cursor:pointer;color:var(--text2);font-weight:600;font-size:14px;transition:all .2s;position:relative;overflow:hidden;}
.nav-item::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);transform:translateX(-100%);transition:transform .5s;}
.nav-item:hover::after{transform:translateX(100%);}
.nav-item:hover{color:var(--text);background:var(--glass);}
.nav-item.active{color:var(--text);background:var(--glass);box-shadow:inset 3px 0 0 var(--accent);}
.nav-item svg{width:22px;height:22px;fill:currentColor;flex-shrink:0;}
.divider{height:1px;background:var(--glass-border);margin:12px 8px;}
.section-label{padding:12px 14px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#555;}
.playlist-item{padding:9px 14px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.playlist-item:hover{color:var(--text);background:var(--glass);transform:translateX(4px);}
.playlist-item.active{color:var(--accent);}
.main{overflow-y:auto;position:relative;overflow-x:hidden;}
.main-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;}
.main-bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(255,107,53,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(29,185,84,.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(132,0,231,.04) 0%,transparent 60%);animation:bgFloat 20s ease-in-out infinite;}
@keyframes bgFloat{0%,100%{transform:translate(0,0) rotate(0deg);}25%{transform:translate(2%,-2%) rotate(1deg);}50%{transform:translate(-1%,2%) rotate(-1deg);}75%{transform:translate(-2%,-1%) rotate(0deg);}}
.main-header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:16px;padding:16px 32px;background:rgba(10,10,10,.75);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-bottom:1px solid var(--glass-border);}
.search-wrapper{position:relative;flex:1;max-width:500px;}
.search-box{display:flex;align-items:center;background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:24px;padding:10px 18px;width:100%;transition:all .3s;}
.search-box:focus-within{border-color:var(--accent);background:rgba(255,255,255,.1);box-shadow:0 0 30px rgba(255,107,53,.15);transform:scale(1.02);}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;margin-left:10px;}
.search-box input::placeholder{color:var(--text3);}
.search-box svg{width:20px;height:20px;fill:var(--text2);flex-shrink:0;}
.autocomplete-list{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(20,20,20,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:12px;max-height:300px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideDown .2s ease;}
.autocomplete-list.show{display:block;}
.autocomplete-list::-webkit-scrollbar{width:6px;}
.autocomplete-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px;}
.ac-item{padding:10px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.05);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:rgba(255,107,53,.15);transform:translateX(4px);}
.ac-item .ac-icon{width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ac-item .ac-icon svg{width:18px;height:18px;fill:#fff;}
.ac-item .ac-text{overflow:hidden;}
.ac-item .ac-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-item .ac-sub{font-size:12px;color:var(--text2);}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.content{padding:24px 32px 128px;position:relative;z-index:1;}
.source-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.source-tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;border:1px solid transparent;display:flex;align-items:center;gap:6px;}
.source-tab:hover{color:var(--text);background:var(--glass);transform:translateY(-2px);}
.source-tab.active{color:#fff;}
.source-tab.active.deezer{background:#a238ff;border-color:#a238ff;box-shadow:0 4px 16px rgba(162,56,255,.3);}
.source-tab.active.youtube{background:#e91429;border-color:#e91429;box-shadow:0 4px 16px rgba(233,20,41,.3);}
.source-tab.active.all{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 16px rgba(255,107,53,.3);}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px;margin-top:16px;}
.card{background:var(--surface);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid var(--glass-border);border-radius:12px;padding:14px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(255,255,255,.05),transparent);opacity:0;transition:.3s;}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.4);border-color:rgba(255,255,255,.2);}
.card:hover::before{opacity:1;}
.card-img{width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .3s;}
.card:hover .card-img{transform:scale(1.05);}
.card h3{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card p{font-size:12px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.play-overlay{position:absolute;bottom:72px;right:18px;width:44px;height:44px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(8px) scale(.9);transition:all .3s;box-shadow:0 6px 20px rgba(255,107,53,.4);z-index:2;}
.card:hover .play-overlay{opacity:1;transform:translateY(0) scale(1);}
.play-overlay svg{width:18px;height:18px;fill:#fff;margin-left:2px;}
.track-list{margin-top:12px;}
.track-item{display:grid;grid-template-columns:36px 1fr 2fr 80px;align-items:center;gap:14px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;position:relative;overflow:hidden;}
.track-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity .2s;}
.track-item:hover{background:var(--glass);transform:translateX(4px);}
.track-item:hover::before{opacity:1;}
.track-item.playing{color:var(--accent);background:rgba(255,107,53,.08);}
.track-item.playing::before{opacity:1;}
.track-item .num{text-align:center;font-size:13px;width:24px;}
.track-item .title{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.track-item .artist{font-size:12px;color:var(--text2);}
.track-item .duration{text-align:right;font-size:12px;}
.player{grid-column:1/-1;background:rgba(12,12,12,.9);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-top:1px solid var(--glass-border);display:grid;grid-template-columns:280px 1fr 280px;align-items:center;padding:0 16px;position:relative;z-index:200;}
.player::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);opacity:.6;animation:playerGlow 3s ease-in-out infinite;}
@keyframes playerGlow{0%,100%{opacity:.4;}50%{opacity:.8;}}
.player-track{display:flex;align-items:center;gap:12px;}
.player-track img{width:52px;height:52px;border-radius:8px;object-fit:cover;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:coverFloat 4s ease-in-out infinite;}
@keyframes coverFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);}}
.player-track .info{overflow:hidden;}
.player-track .name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-track .artist{font-size:11px;color:var(--text2);}
.player-controls{display:flex;flex-direction:column;align-items:center;gap:6px;}
.player-buttons{display:flex;align-items:center;gap:14px;}
.player-buttons button{background:none;border:none;color:var(--text2);cursor:pointer;transition:all .2s;padding:4px;display:flex;align-items:center;justify-content:center;}
.player-buttons button:hover{color:var(--text);transform:scale(1.15);}
.player-buttons button.active{color:var(--accent);}
.player-buttons svg{width:18px;height:18px;fill:currentColor;}
.player-buttons .play-main{width:36px;height:36px;background:var(--text);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;transition:all .2s;}
.player-buttons .play-main:hover{transform:scale(1.1);box-shadow:0 0 24px rgba(255,255,255,.4);}
.player-buttons .play-main svg{fill:#000;width:16px;height:16px;}
.progress-bar{display:flex;align-items:center;gap:8px;width:100%;max-width:580px;}
.progress-bar span{font-size:11px;color:var(--text2);min-width:34px;text-align:center;font-variant-numeric:tabular-nums;}
.progress-track{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;width:0%;transition:width .1s;position:relative;}
.progress-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:#fff;border-radius:50%;opacity:0;transition:opacity .2s;box-shadow:0 0 8px rgba(255,255,255,.5);}
.progress-track:hover .progress-fill::after{opacity:1;}
.progress-track:hover .progress-fill{height:6px;margin-top:-1px;}
.player-extra{display:flex;align-items:center;justify-content:flex-end;gap:10px;}
.player-extra button{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;display:flex;transition:all .2s;}
.player-extra button:hover{color:var(--text);transform:scale(1.1);}
.player-extra button.active{color:var(--accent);}
.player-extra svg{width:17px;height:17px;fill:currentColor;}
.volume-bar{width:90px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer;position:relative;transition:height .2s;}
.volume-bar:hover{height:6px;margin-top:-1px;}
.volume-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;width:70%;position:relative;}
.volume-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:#fff;border-radius:50%;opacity:0;transition:opacity .2s;box-shadow:0 0 8px rgba(255,255,255,.5);}
.volume-bar:hover .volume-fill::after{opacity:1;}
.queue-panel{position:fixed;right:0;top:0;bottom:90px;width:320px;background:rgba(15,15,15,.95);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);z-index:50;transform:translateX(100%);transition:all .3s;overflow-y:auto;padding:20px;border-left:1px solid var(--glass-border);}
.queue-panel.show{transform:translateX(0);}
.queue-panel h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.queue-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:all .15s;}
.queue-item:hover{background:var(--glass);transform:translateX(4px);}
.queue-item.active{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.2);}
.queue-item img{width:40px;height:40px;border-radius:6px;object-fit:cover;}
.queue-item .qinfo{overflow:hidden;}
.queue-item .qname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.queue-item .qartist{font-size:11px;color:var(--text2);}
.radio-banner{background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(29,185,84,.1));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:16px;padding:24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.radio-banner h2{font-size:24px;font-weight:700;margin-bottom:4px;}
.radio-banner p{color:var(--text2);font-size:14px;}
.radio-controls{display:flex;gap:12px;flex-wrap:wrap;}
.radio-btn{padding:10px 20px;border-radius:24px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);cursor:pointer;font-weight:600;font-size:13px;transition:all .2s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.radio-btn:hover{background:rgba(255,255,255,.15);border-color:var(--accent);transform:translateY(-2px);}
.radio-btn.active{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 16px rgba(255,107,53,.3);}
.local-add{background:var(--surface);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:2px dashed var(--glass-border);border-radius:16px;padding:48px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:24px;}
.local-add:hover{border-color:var(--accent);background:rgba(255,107,53,.05);transform:scale(1.02);}
.local-add svg{width:48px;height:48px;fill:var(--text2);margin-bottom:12px;}
.local-add h3{font-size:16px;margin-bottom:4px;}
.local-add p{font-size:13px;color:var(--text2);}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
.badge-deezer{background:rgba(162,56,255,.2);color:#a238ff;}
.badge-youtube{background:rgba(233,20,41,.2);color:#ff4444;}
.badge-local{background:rgba(29,185,84,.2);color:#1db954;}
.notification{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transform:translateX(120%);transition:all .4s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.notification.show{transform:translateX(0);}
.notification.success{background:rgba(29,185,84,.9);color:#fff;}
.notification.error{background:rgba(233,20,41,.9);color:#fff;}
.notification.info{background:rgba(80,155,245,.9);color:#fff;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--glass-border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text2);font-size:14px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:16px;color:var(--text2);}
.empty svg{width:64px;height:64px;fill:var(--text2);opacity:.4;}
.empty p{font-size:16px;}
.tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;}
.tab:hover{color:var(--text);transform:translateY(-1px);}
.tab.active{background:var(--glass);color:var(--text);border:1px solid var(--glass-border);}
.section{margin-bottom:36px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-header h2{font-size:22px;font-weight:700;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .5s ease;}
::-webkit-scrollbar{width:7px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25);}
@media(max-width:800px){.app{grid-template-columns:1fr;}.sidebar{display:none;}.player{grid-template-columns:1fr 1fr 1fr;}.track-item{grid-template-columns:32px 1fr 60px;}.track-item .artist-col{display:none;}.search-box{width:240px;}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="logo">
<div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
<span>Melodika</span>
</div>
<div class="nav-item active" data-section="search" onclick="switchSection('search')">
<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
<span>Поиск</span>
</div>
<div class="nav-item" data-section="trending" onclick="switchSection('trending')">
<svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
<span>Популярное</span>
</div>
<div class="nav-item" data-section="radio" onclick="switchSection('radio')">
<svg viewBox="0 0 24 24"><path d="M3.24 6.15C2.51 6.43 2 7.17 2 8v12c0 1.1.89 2 2 2h16c1.11 0 2-.9 2-2V8c0-1.11-.89-2-2-2H8.3l8.26-3.34-.37-.92L3.24 6.15zM7 20c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm13-8h-2v-2h-2v2H4V8h16v4z"/></svg>
<span>Радио</span>
</div>
<div class="nav-item" data-section="local" onclick="switchSection('local')">
<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
<span>Мои файлы</span>
</div>
<div class="divider"></div>
<div class="section-label">Плейлисты</div>
<div id="playlistList"></div>
<div class="divider"></div>
<div class="section-label">История</div>
<div id="historyList"></div>
</div>
<div class="main">
<div class="main-bg"></div>
<div class="main-header">
<div class="search-wrapper">
<div class="search-box">
<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
<input type="text" id="searchInput" placeholder="Исполнитель, трек..." oninput="handleAutocomplete(this.value)" onkeydown="if(event.key==='Enter')doSearch()">
</div>
<div class="autocomplete-list" id="autocompleteList"></div>
</div>
</div>
<div class="content" id="content"></div>
</div>
<div class="player">
<div class="player-track">
<img id="playerImg" src="" alt="">
<div class="info">
<div class="name" id="playerName">Найдите музыку</div>
<div class="artist" id="playerArtist">—</div>
</div>
</div>
<div class="player-controls">
<div class="player-buttons">
<button onclick="toggleShuffle()" id="shuffleBtn" title="Перемешать">
<svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
</button>
<button onclick="prevTrack()" title="Назад">
<svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
</button>
<button class="play-main" onclick="togglePlay()" id="playBtn" title="Играть">
<svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
</button>
<button onclick="nextTrack()" title="Вперёд">
<svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
</button>
<button onclick="toggleRepeat()" id="repeatBtn" title="Повтор">
<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
</button>
</div>
<div class="progress-bar">
<span id="currentTime">0:00</span>
<div class="progress-track" id="progressTrack" onclick="seek(event)" onmousedown="startDrag(event)">
<div class="progress-fill" id="progressFill"></div>
</div>
<span id="totalTime">0:00</span>
</div>
</div>
<div class="player-extra">
<button onclick="toggleQueue()" title="Очередь">
<svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
</button>
<button onclick="toggleMute()" id="muteBtn" title="Громкость">
<svg viewBox="0 0 24 24" id="volumeIcon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
</button>
<div class="volume-bar" id="volumeBar" onclick="setVolume(event)" onmousedown="startVolDrag(event)">
<div class="volume-fill" id="volumeFill"></div>
</div>
</div>
</div>
</div>
<div class="queue-panel" id="queuePanel">
<h3>Очередь <button onclick="toggleQueue()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;">✕</button></h3>
<div id="queueList"></div>
</div>
<div class="notification" id="notification"></div>
<audio id="audio" preload="auto"></audio>
<input type="file" id="fileInput" accept="audio/*" multiple style="display:none">

<script>
const CORS=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?'];
let corsIdx=0,allTracks=[],localFiles=[],queue=[],currentIndex=-1,isPlaying=false,isShuffle=false,repeatMode=0,currentSection='search',history=[],activeSource='all';
const playlists=[{id:1,name:'Любимые',ids:[]},{id:2,name:'Для работы',ids:[]},{id:3,name:'Вечерний чилл',ids:[]},{id:4,name:'Энергия',ids:[]}];
const audio=document.getElementById('audio');

async function fetchCORS(url){try{const r=await fetch(url,{signal:AbortSignal.timeout(6000)});if(r.ok)return await r.json();}catch(e){}const proxy=CORS[corsIdx];try{const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(6000)});if(r.ok)return await r.json();}catch(e){}corsIdx=(corsIdx+1)%CORS.length;return null;}

async function searchDeezer(query){try{const data=await fetchCORS('https://api.deezer.com/search?q='+encodeURIComponent(query)+'&limit=40');if(!data||!data.data)return[];return data.data.map(t=>({id:'dz_'+t.id,title:t.title,artist:t.artist.name,album:t.album.title,duration:t.duration,cover:t.album.cover_medium||t.album.cover,preview:t.preview,source:'deezer',trackId:t.id}));}catch(e){return[];}}

async function searchYouTube(query){const instances=['https://pipedapi.kavin.rocks','https://piped-api.kavin.wiki','https://pipedapi.adminforge.de'];for(const base of instances){try{const data=await fetchCORS(base+'/search?q='+encodeURIComponent(query)+'&filter=videos');if(data&&data.results){return data.results.filter(r=>r.url&&r.url.includes('youtube.com')).map(r=>{const m=(r.url.match(/v=([a-zA-Z0-9_-]{11})/)||[])[1]||'';return{id:'yt_'+m,title:r.title||'Без названия',artist:r.uploader||'Неизвестный',duration:r.duration||0,cover:r.thumbnail||'',source:'youtube',videoId:m};}).filter(t=>t.id);}}catch(e){continue;}}return[];}

async function getYoutubeStream(videoId){const instances=['https://pipedapi.kavin.rocks','https://piped-api.kavin.wiki','https://pipedapi.adminforge.de'];for(const base of instances){try{const data=await fetchCORS(base+'/streams/'+videoId);if(data&&data.audioStreams&&data.audioStreams.length){const sorted=data.audioStreams.sort((a,b)=>(b.bitrate||0)-(a.bitrate||0));return sorted[0].url;}}catch(e){continue;}}return null;}

// ===== AUTO-SUGGEST =====
let suggestTimeout=null;
async function handleAutocomplete(value){
const list=document.getElementById('autocompleteList');
if(!value||value.length<2){list.classList.remove('show');list.innerHTML='';return;}
clearTimeout(suggestTimeout);
suggestTimeout=setTimeout(async()=>{
try{
const data=await fetchCORS('https://api.deezer.com/search?q='+encodeURIComponent(value)+'&limit=8');
if(data&&data.data&&data.data.length){
list.innerHTML=data.data.slice(0,8).map(t=>`
<div class="ac-item" onclick="selectSuggestion('${t.title.replace(/'/g,"\\'")}','${t.artist.name.replace(/'/g,"\\'")}')">
<div class="ac-icon"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
<div class="ac-text"><div class="ac-title">${t.title}</div><div class="ac-sub">${t.artist.name}</div></div>
</div>`).join('');
list.classList.add('show');
}else{list.classList.remove('show');list.innerHTML='';}
}catch(e){list.classList.remove('show');list.innerHTML='';}
},300);
}

function selectSuggestion(title,artist){
document.getElementById('searchInput').value=title+' '+artist;
document.getElementById('autocompleteList').classList.remove('show');
doSearch();
}

document.addEventListener('click',function(e){if(!e.target.closest('.search-wrapper')){document.getElementById('autocompleteList').classList.remove('show');}});

// ===== SEARCH =====
async function doSearch(){
const query=document.getElementById('searchInput').value.trim();
if(!query)return;
document.getElementById('autocompleteList').classList.remove('show');
switchSection('search');
document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><p>Поиск по всем источникам...</p></div>';
const[dz,yt]=await Promise.allSettled([searchDeezer(query),searchYouTube(query)]);
const deezer=dz.status==='fulfilled'?dz.value:[];
const youtube=yt.status==='fulfilled'?yt.value:[];
allTracks=[...deezer,...youtube];
if(!allTracks.length){document.getElementById('content').innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><p>Ничего не найдено</p></div>';return;}
renderResults(query,deezer,youtube);
}

function renderResults(query,deezer,youtube){
const filtered=activeSource==='all'?allTracks:activeSource==='deezer'?deezer:youtube;
document.getElementById('content').innerHTML=`
<div class="source-tabs">
<div class="source-tab all ${activeSource==='all'?'active':''}" onclick="setSource('all')">🎵 Все (${allTracks.length})</div>
<div class="source-tab deezer ${activeSource==='deezer'?'active':''}" onclick="setSource('deezer')">💜 Deezer (${deezer.length})</div>
<div class="source-tab youtube ${activeSource==='youtube'?'active':''}" onclick="setSource('youtube')">▶ YouTube (${youtube.length})</div>
</div>
<div class="section fade-in">
<div class="section-header"><h2>Результаты: «${query}»</h2></div>
<div class="card-grid">${filtered.slice(0,16).map((t,i)=>`<div class="card" onclick="playTrack(${i})"><img class="card-img" src="${t.cover||genCover(t.title,t.artist)}" alt="" loading="lazy" onerror="this.style.background='#333'"><div class="play-overlay" onclick="event.stopPropagation();playTrack(${i})"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><h3>${t.title}</h3><p>${t.artist} · ${fmtDur(t.duration)}</p></div>`).join('')}</div>
</div>
<div class="section fade-in">
<div class="section-header"><h2>Все результаты (${filtered.length})</h2></div>
<div class="track-list">${filtered.map((t,i)=>`<div class="track-item" ondblclick="playTrack(${i})"><div class="num">${i+1}</div><div><div class="title">${t.title}<span class="badge badge-${t.source}">${t.source==='deezer'?'DZ':'YT'}</span></div><div class="artist">${t.artist}</div></div><div class="artist-col">${t.album||t.artist}</div><div class="duration">${fmtDur(t.duration)}</div></div>`).join('')}</div>
</div>`;
}

function setSource(s){activeSource=s;const q=document.getElementById('searchInput').value.trim();if(!q)return;const dz=allTracks.filter(t=>t.source==='deezer');const yt=allTracks.filter(t=>t.source==='youtube');renderResults(q,dz,yt);}

function genCover(title,artist){const c=document.createElement('canvas');c.width=300;c.height=300;const ctx=c.getContext('2d');const colors=['#e13300','#1db954','#e8115b','#509bf5','#bc5900','#8c1932','#1e3264','#e91429','#f59b23'];const color=colors[Math.floor(Math.random()*colors.length)];const grad=ctx.createLinearGradient(0,0,300,300);grad.addColorStop(0,color);grad.addColorStop(1,darken(color,40));ctx.fillStyle=grad;ctx.fillRect(0,0,300,300);ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='bold 80px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(title[0]||'?',150,150);return c.toDataURL();}
function darken(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function fmtDur(sec){if(!sec||sec<=0)return'—';const m=Math.floor(sec/60);return m+':'+(Math.floor(sec%60)+'').padStart(2,'0');}

// ===== PLAY =====
async function playTrack(index){
if(index<0||index>=allTracks.length)return;
const track=allTracks[index];
if(track.source==='deezer'){
if(track.preview){showNotification('▶ Воспроизведение (превью)','success');playDirect(track,track.preview);}
else{showNotification('Нет превью','error');}
return;
}
if(track.source==='youtube'){
showNotification('Загрузка YouTube...','info');
const url=await getYoutubeStream(track.videoId);
if(!url){showNotification('Не удалось загрузить','error');return;}
track.streamUrl=url;track.cover='https://img.youtube.com/vi/'+track.videoId+'/hqdefault.jpg';
playDirect(track,url);
}
}

function playDirect(track,url){
if(!queue.find(q=>q.id===track.id&&q.source===track.source))queue.push(track);
currentIndex=queue.findIndex(q=>q.id===track.id&&q.source===track.source);
if(currentIndex<0){queue.unshift(track);currentIndex=0;}
audio.src=url;audio.play().then(()=>{isPlaying=true;updBtn();updUI();}).catch(()=>showNotification('Ошибка','error'));
addHist(track);
}

function togglePlay(){if(currentIndex<0||!queue[currentIndex])return;if(isPlaying){audio.pause();isPlaying=false;}else{audio.play().catch(()=>{});isPlaying=true;}updBtn();}
function nextTrack(){if(!queue.length)return;if(isShuffle){let i;do{i=Math.floor(Math.random()*queue.length);}while(i===currentIndex&&queue.length>1);pq(i);}else pq((currentIndex+1)%queue.length);}
function prevTrack(){if(!queue.length)return;if(audio.currentTime>3){pq(currentIndex);return;}pq((currentIndex-1+queue.length)%queue.length);}
function pq(idx){if(idx<0||idx>=queue.length)return;const t=queue[idx];if(t.source==='deezer'&&t.preview){currentIndex=idx;audio.src=t.preview;audio.play().then(()=>{isPlaying=true;updBtn();updUI();});}else if(t.source==='youtube'&&t.streamUrl){currentIndex=idx;audio.src=t.streamUrl;audio.play().then(()=>{isPlaying=true;updBtn();updUI();});}else if(t.source==='local'){currentIndex=idx;audio.src=t.streamUrl;audio.play().then(()=>{isPlaying=true;updBtn();updUI();});}}
function toggleShuffle(){isShuffle=!isShuffle;document.getElementById('shuffleBtn').classList.toggle('active',isShuffle);}
function toggleRepeat(){repeatMode=(repeatMode+1)%3;document.getElementById('repeatBtn').classList.toggle('active',repeatMode>0);}

audio.addEventListener('ended',()=>{if(repeatMode===2){audio.currentTime=0;audio.play();}else if(repeatMode===1){nextTrack();}else{if(currentIndex<queue.length-1){nextTrack();}else{isPlaying=false;updBtn();}}});
audio.addEventListener('timeupdate',()=>{if(!audio.duration)return;const p=(audio.currentTime/audio.duration)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('currentTime').textContent=fmtT(audio.currentTime);document.getElementById('totalTime').textContent=fmtT(audio.duration);});

function seek(e){if(!audio.duration)return;const r=e.currentTarget.getBoundingClientRect();const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));audio.currentTime=p*audio.duration;}
let dragging=false;
function startDrag(e){dragging=true;seek(e);document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',stopDrag);}
function onDrag(e){if(dragging&&audio.duration)seek(e);}
function stopDrag(){dragging=false;document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',stopDrag);}

// ===== VOLUME (FIXED) =====
function setVolume(e){
const bar=document.getElementById('volumeBar');
const rect=bar.getBoundingClientRect();
const x=e.clientX||e.touches?.[0]?.clientX||0;
const vol=Math.max(0,Math.min(1,(x-rect.left)/rect.width));
audio.volume=vol;
document.getElementById('volumeFill').style.width=(vol*100)+'%';
}

let volDrag=false;
function startVolDrag(e){volDrag=true;setVolume(e);e.preventDefault();document.addEventListener('mousemove',onVDrag);document.addEventListener('mouseup',stopVDrag);document.addEventListener('touchmove',onVDragTouch);document.addEventListener('touchend',stopVDragTouch);}
function onVDrag(e){if(volDrag)setVolume(e);}
function onVDragTouch(e){if(volDrag){e.preventDefault();setVolume(e);}}
function stopVDrag(){volDrag=false;document.removeEventListener('mousemove',onVDrag);document.removeEventListener('mouseup',stopVDrag);document.removeEventListener('touchmove',onVDragTouch);document.removeEventListener('touchend',stopVDragTouch);}

function toggleMute(){if(audio.volume>0){audio.dataset.pv=audio.volume;audio.volume=0;}else{audio.volume=parseFloat(audio.dataset.pv)||0.7;}document.getElementById('volumeFill').style.width=(audio.volume*100)+'%';}
function fmtT(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60);return m+':'+(Math.floor(s%60)+'').padStart(2,'0');}
function updBtn(){const i=document.getElementById('playIcon');i.innerHTML=isPlaying?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';}
function updUI(){const t=queue[currentIndex];if(!t)return;document.getElementById('playerImg').src=t.cover||'';document.getElementById('playerName').textContent=t.title;document.getElementById('playerArtist').textContent=t.artist;document.title=t.title+' — Melodika';}

// ===== LOCAL FILES =====
function openLocal(){document.getElementById('fileInput').click();}
document.getElementById('fileInput').addEventListener('change',function(e){const files=Array.from(e.target.files);files.forEach(f=>{localFiles.push({id:Date.now()+Math.random(),name:f.name,file:f});});renderLocal();showNotification('Добавлено: '+files.length+' файл(ов)','success');e.target.value='';});
function renderLocal(){const c=document.getElementById('content');if(!localFiles.length){c.innerHTML=`<div class="local-add" onclick="openLocal()"><svg viewBox="0 0 24 24"><path d="M19.35 10.04C19.59 10.46 19.75 10.96 19.75 11.5V17.5C19.75 18.88 18.62 20 17.25 20H6.75C5.38 20 4.25 18.88 4.25 17.5V11.5C4.25 10.96 4.41 10.46 4.65 10.04L4 13H14L13.35 10.04C12.8 9.5 12.03 9.17 11.2 9.17H9.5C8.13 9.17 7 10.29 7 11.66V17.5C7 19.18 8.32 20.5 10 20.5H14C15.68 20.5 17 19.18 17 17.5V11.66C17 10.83 16.69 10.06 16.15 9.5L19.35 10.04Z"/></svg><h3>Добавить файлы с компьютера</h3><p>MP3, WAV, OGG, FLAC, M4A</p></div><div class="empty"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg><p>Нет добавленных файлов</p></div>`;return;}c.innerHTML=`<div class="section"><div class="section-header"><h2>Мои файлы (${localFiles.length})</h2><button class="tab active" onclick="openLocal()" style="background:var(--accent);color:#fff;">+ Добавить</button></div><div class="track-list">${localFiles.map((t,i)=>`<div class="track-item" ondblclick="playLF(${i})"><div class="num">${i+1}</div><div><div class="title">${t.name.replace(/\.[^.]+$/,'')}<span class="badge badge-local">LOCAL</span></div><div class="artist">Локальный файл</div></div><div class="artist-col">—</div><div class="duration">—</div></div>`).join('')}</div></div>`;}
function playLF(idx){if(idx<0||idx>=localFiles.length)return;const url=URL.createObjectURL(localFiles[idx].file);const track={id:'l_'+localFiles[idx].id,title:localFiles[idx].name.replace(/\.[^.]+$/,''),artist:'Локальный',duration:0,cover:'',source:'local',streamUrl:url};queue.push(track);currentIndex=queue.length-1;audio.src=url;audio.play().then(()=>{isPlaying=true;updBtn();updUI();showNotification('▶ Локальный файл','success');});addHist(track);}

// ===== RADIO =====
async function loadRadio(){document.getElementById('content').innerHTML=`<div class="section"><div class="radio-banner"><div><h2>📻 Музыкальное радио</h2><p>Подберём музыку по вашему вкусу</p></div><div class="radio-controls"><button class="radio-btn active" onclick="startRadio('chill')">🌙 Чилл</button><button class="radio-btn" onclick="startRadio('energy')">⚡ Энергия</button><button class="radio-btn" onclick="startRadio('pop')">🎤 Поп</button><button class="radio-btn" onclick="startRadio('rock')">🎸 Рок</button></div></div><div id="radioRes"><div class="empty"><p>Выберите жанр</p></div></div></div>`;}
async function startRadio(genre){document.querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');const c=document.getElementById('radioRes');c.innerHTML='<div class="loading"><div class="spinner"></div><p>Подбираем музыку...</p></div>';const qs={chill:['chill music 2024','lofi hip hop','relaxing music'],energy:['workout music 2024','energy music','gym music'],pop:['top pop hits 2024','best pop songs','pop hits'],rock:['rock music 2024','best rock songs','classic rock']};const ql=qs[genre]||qs.pop;let all=[];for(const q of ql){const dz=await searchDeezer(q);const yt=await searchYouTube(q);all=[...all,...dz,...yt];if(all.length>=20)break;}const seen=new Set();all=all.filter(t=>{if(seen.has(t.id))return false;seen.add(t.id);return true;});if(!all.length){c.innerHTML='<div class="empty"><p>Не удалось загрузить</p></div>';return;}allTracks=all;const names={chill:'Чилл',energy:'Энергия',pop:'Поп',rock:'Рок'};c.innerHTML=`<div class="section"><div class="section-header"><h2>Радио: ${names[genre]}</h2><span class="tab active" onclick="playTrack(0)" style="background:var(--accent);color:#fff;">▶ Слушать</span></div><div class="track-list">${all.map((t,i)=>`<div class="track-item" ondblclick="playTrack(${i})"><div class="num">${i+1}</div><div><div class="title">${t.title}<span class="badge badge-${t.source}">${t.source==='deezer'?'DZ':'YT'}</span></div><div class="artist">${t.artist}</div></div><div class="artist-col">${t.artist}</div><div class="duration">${fmtDur(t.duration)}</div></div>`).join('')}</div></div>`;}

// ===== TRENDING =====
async function loadTrending(){document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><p>Загрузка популярного...</p></div>';const qs=['top hits 2024','popular music','хиты рф','популярная музыка','best songs 2024'];let all=[];for(const q of qs){const dz=await searchDeezer(q);const yt=await searchYouTube(q);all=[...all,...dz,...yt];if(all.length>=30)break;}const seen=new Set();all=all.filter(t=>{if(seen.has(t.id))return false;seen.add(t.id);return true;});if(!all.length){document.getElementById('content').innerHTML='<div class="empty"><p>Не удалось загрузить</p></div>';return;}allTracks=all;document.getElementById('content').innerHTML=`<div class="section"><div class="section-header"><h2>🔥 Популярное сейчас</h2></div><div class="card-grid">${all.slice(0,20).map((t,i)=>`<div class="card" onclick="playTrack(${i})"><img class="card-img" src="${t.cover||genCover(t.title,t.artist)}" alt="" loading="lazy"><div class="play-overlay" onclick="event.stopPropagation();playTrack(${i})"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><h3>${t.title}</h3><p>${t.artist}</p></div>`).join('')}</div></div>`;}

// ===== HISTORY =====
function addHist(t){history=history.filter(h=>h.id!==t.id);history.unshift({...t,ts:Date.now()});if(history.length>50)history=history.slice(0,50);renderHist();}
function renderHist(){const l=document.getElementById('historyList');if(!history.length){l.innerHTML='';return;}l.innerHTML=history.slice(0,10).map(h=>`<div class="playlist-item" onclick="playTrack(allTracks.findIndex(t=>t.id==='${h.id}'))">${h.title}</div>`).join('');}

// ===== QUEUE =====
function toggleQueue(){document.getElementById('queuePanel').classList.toggle('show');renderQ();}
function renderQ(){const l=document.getElementById('queueList');if(!queue.length){l.innerHTML='<p style="color:var(--text2);">Очередь пуста</p>';return;}l.innerHTML=queue.map((t,i)=>`<div class="queue-item ${i===currentIndex?'active':''}" onclick="pq(${i})"><img src="${t.cover||''}" alt="" onerror="this.style.display='none'"><div class="qinfo"><div class="qname">${t.title} <span class="badge badge-${t.source}" style="font-size:8px;">${t.source==='deezer'?'DZ':'YT'}</span></div><div class="qartist">${t.artist}</div></div></div>`).join('');}

// ===== PLAYLISTS =====
function renderPL(){const l=document.getElementById('playlistList');l.innerHTML=playlists.map(p=>`<div class="playlist-item" onclick="openPL(${p.id})">${p.name} (${p.ids.length})</div>`).join('');}
function openPL(id){const pl=playlists.find(p=>p.id===id);if(!pl)return;const pts=pl.ids.map(tid=>allTracks.find(t=>t.id===tid)).filter(Boolean);const c=document.getElementById('content');c.innerHTML=`<div class="section"><div class="section-header"><h2>📁 ${pl.name}</h2></div>${pts.length?`<div class="track-list">${pts.map((t,i)=>`<div class="track-item" ondblclick="playTrack(allTracks.findIndex(x=>x.id===t.id))"><div class="num">${i+1}</div><div><div class="title">${t.title}<span class="badge badge-${t.source}">${t.source==='deezer'?'DZ':'YT'}</span></div><div class="artist">${t.artist}</div></div><div class="artist-col">${t.artist}</div><div class="duration">${fmtDur(t.duration)}</div></div>`).join('')}</div>`:'<div class="empty"><p>Плейлист пуст</p></div>'}</div>`;}

// ===== SECTIONS =====
function switchSection(s){currentSection=s;document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.section===s));renderPL();const c=document.getElementById('content');if(s==='search'){c.innerHTML='<div class="empty fade-in"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><p>Введите запрос для поиска музыки</p></div>';}else if(s==='trending'){loadTrending();}else if(s==='radio'){loadRadio();}else if(s==='local'){renderLocal();}}

// ===== NOTIFICATIONS =====
function showNotification(msg,type='info'){const el=document.getElementById('notification');el.textContent=msg;el.className='notification '+type+' show';clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.code==='Space'){e.preventDefault();togglePlay();}if(e.code==='ArrowRight'&&e.ctrlKey){e.preventDefault();nextTrack();}if(e.code==='ArrowLeft'&&e.ctrlKey){e.preventDefault();prevTrack();}if(e.code==='KeyS'&&e.ctrlKey){e.preventDefault();document.getElementById('searchInput').focus();}});

// ===== INIT =====
audio.volume=0.7;document.getElementById('volumeFill').style.width='70%';switchSection('search');
</script>
</body>
</html>
